<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Netlify form registration</title>
  </head>
  <body>
    <!--
      Static form registration for Netlify Forms.
      Netlify's build-time scanner reads this file (copied verbatim from /public)
      and registers every form + its fields, so the real submissions on the live
      pages get processed instead of 404-ing. Keep field names in sync with
      ContactForm.astro. Not linked anywhere; humans never see it.
    -->

    <form name="magento-contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" /><input type="email" name="email" /><input type="url" name="store" /><textarea name="message"></textarea>
    </form>
    <form name="shopware-contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" /><input type="email" name="email" /><input type="url" name="store" /><textarea name="message"></textarea>
    </form>

    <!-- Forms that also submit the on-page quiz result -->
